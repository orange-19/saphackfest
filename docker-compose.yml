services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Immutable audit ledger
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: governance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     governance
      POSTGRES_PASSWORD: governance
      POSTGRES_DB:       governance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance -d governance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7 — O(1) static-rule cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: governance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    driver: local
